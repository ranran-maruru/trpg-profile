<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="scenario.css" />
    <script src="scenario.js" defer></script>
    <title>シナリオ管理</title>
  </head>
  <body>
    <div class="header">
      <img src="data/icon.png" alt="アイコン" class="header-icon" />
      <span class="header-text">
        <span class="header-title">シナリオ管理</span>
        <span class="header-subtitle">らんまるが遊んだシナリオ</span>
      </span>
    </div>
    <div class="tabs">
      <ul>
        <!-- スライド用のインジケーター -->
        <div class="slide-indicator"></div>
        <li class="selected" data-id="tab-1">通過済みリスト</li>
        <li data-id="tab-2">GMできるシナリオ</li>
        <li data-id="tab-3">行きたいシナリオ</li>
      </ul>
    </div>
    <div class="container">
      <div class="tab-container">
        <!-- 通過済みリスト -->
        <div class="tab-content selected" id="tab-1">
          <!-- フィルタ・検索 -->
          <div class="scenarios-section">
            <div class="scenarios-header">
              <div class="search-box">
                <input
                  type="text"
                  id="searchInput"
                  placeholder="シナリオ名で検索"
                />
              </div>
              <div class="stats" id="stats"></div>
            </div>
            <div class="filter-tags">
              <button class="filter-tag selected" data-filter="all"
                >すべて</button
              >
              <button class="filter-tag" data-filter="coc6th">CoC 6th</button>
              <button class="filter-tag" data-filter="coc7th">CoC 7th</button>
              <button class="filter-tag" data-filter="madamis">マダミス</button>
              <button class="filter-tag" data-filter="dx3rd">DX 3rd</button>
            </div>

            <!-- シナリオ一覧 -->
            <div class="scenarios-grid" id="scenariosGrid">
              <div class="empty-state">
                <div class="empty-state-icon">📚</div>
                <p>通過済みシナリオがまだありません。</p>
              </div>
            </div>
          </div>
        </div>
        <div class="tab-content" id="tab-2">
          <div> 準備中 </div>
        </div>
        <div class="tab-content" id="tab-3">
          <div> 準備中 </div>
        </div>
      </div>
    </div>
  </body>
</html>
